    <!-- UI.Tooltip (packages/ui/src/UI/Tooltip.elm) reads
         event.target.boundingClientRect inside its mouseenter decoder.
         This shim defines that property as a getter on Element.prototype.
         Side-effect-only and idempotent — safe on every page. -->
    <script src="./tooltip-shim.js"></script>

    <!-- Position any [popover][data-popover] next to the button that
         opens it. The Popover API gives us light-dismiss, Escape, and
         top-layer rendering for free; this script only adds dropdown-
         style placement based on the trigger's getBoundingClientRect,
         so the picker escapes overflow/transform ancestors and lands
         on whichever side of the trigger has more room. -->
    <script>
      (function () {
        var W = 320,
          H = 280;
        document.addEventListener(
          "beforetoggle",
          function (e) {
            var p = e.target;
            if (!p.matches || !p.matches("[popover][data-popover]")) return;
            if (e.newState !== "open") return;
            var t = document.querySelector('[popovertarget="' + p.id + '"]');
            if (!t) return;
            var r = t.getBoundingClientRect();
            var openDown = innerHeight - r.bottom >= H || r.top < H;
            var openLeft = innerWidth - r.left >= W || r.right < W;
            // Override UA `[popover] { inset: 0 }` first — clearing to ''
            // falls back to that, leaving `top: 0` in effect when we only
            // set `bottom`, which then wins over our `bottom` per CSS
            // over-constraint resolution and pins the picker to the top.
            p.style.top =
              p.style.bottom =
              p.style.left =
              p.style.right =
                "auto";
            if (openDown) p.style.top = r.bottom + 8 + "px";
            else p.style.bottom = innerHeight - r.top + 8 + "px";
            if (openLeft) p.style.left = r.left + "px";
            else p.style.right = innerWidth - r.right + "px";
          },
          true
        );
      })();
    </script>

  <body>
    <div id="app"></div>

    <script src="./main.js"></script>

    <script type="module">
      import { sendInputsToElmApp, inputs } from "./input.js";
      const pageScript = await import("./page-script.js");
      if (pageScript.beforeInit) await pageScript.beforeInit();;

      // Read the URL query into a [key, value] list and hand it to Elm on
      // `inputs.searchParamsFromUrl` — the single URL→Elm channel. The Elm
      // side parses each configuration value against its declared type, and
      // multipage consumers read their own params (e.g. `mode=author` for
      // the PopUp Explainer) from the same list. `null` (not `[]`) when the
      // URL has no params, so the Elm `Maybe (List (String, String))`
      // decodes cleanly; the Elm side calls `Dict.fromList` to recover a dict.
      const urlParams = new URLSearchParams(window.location.search);

      let searchParamsFromUrl = null;
      for (const [key, value] of urlParams.entries()) {
        if (searchParamsFromUrl === null) searchParamsFromUrl = [];
        searchParamsFromUrl.push([key, value]);
      }
      inputs.searchParamsFromUrl = searchParamsFromUrl;

      const app = Elm.LogoyoGame_001_LetterPlacing.Main.init({
        node: document.querySelector("#app"),
        flags: { inputs },
      });

      sendInputsToElmApp(app);
      if (pageScript.afterInit) await pageScript.afterInit(app);;
    </script>
  </body>
</html>
